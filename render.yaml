services:
  - type: web
    name: litflick-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: litflick-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: GOOGLE_BOOKS_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false

  - type: web # Yes, 'web' is correct for static sites too
    name: litflick-frontend
    runtime: static # This is the "magic" keyword that tells Render it's a static site
    publishPath: ./frontend
    buildCommand: "" # Docs say this is required for non-Docker services
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

databases:
  - name: litflick-db
    databaseName: recommender
    plan: free
