services:
  - type: web
    name: litflick-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: litflick-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: GOOGLE_BOOKS_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false

  - type: static
    name: litflick-frontend
    publishPath: ./frontend
    buildCommand: "" # This is mandatory even if empty
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

databases:
  - name: litflick-db
    databaseName: recommender
    plan: free
