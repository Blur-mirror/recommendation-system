<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LitFlick | Admin</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="header-left">
        <a href="index.html" class="logo-link"
          ><img src="favicon/icono.png" alt="LitFlick" class="logo-img" />
          <h1 class="logo">LitFlick</h1></a
        >
      </div>
      <div class="header-center">
        <div class="search-container">
          <input
            type="text"
            id="searchInput"
            placeholder="Search..."
            onkeyup="handleSearch()"
          />
          <span id="clearSearch" class="clear-btn" onclick="clearSearchInput()"
            >&times;</span
          >
        </div>
      </div>
      <div class="hamburger" id="hamburger-menu">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="header-right">
        <nav class="nav-links">
          <a href="recommendations.html" class="nav-item">For You</a>
          <a href="index.html" class="nav-item">Movies</a>
          <a href="books.html" class="nav-item">Books</a>
          <a
            href="admin.html"
            class="nav-item active"
            id="adminNavLink"
            style="color: #a855f7"
            >Admin</a
          >
        </nav>
        <div class="auth-buttons">
          <div class="user-info" id="userInfo">
            <span id="username" style="font-size: 0.9rem"></span>
          </div>
          <button class="btn-outline" id="loginBtn" onclick="showLoginModal()">
            Login
          </button>
          <button
            class="btn-purple"
            id="registerBtn"
            onclick="showRegisterModal()"
          >
            Register
          </button>
          <button
            class="btn-outline"
            id="logoutBtn"
            onclick="logout()"
            style="display: none"
          >
            Logout
          </button>
        </div>
      </div>
    </header>

    <div class="container">
      <div
        id="stats"
        style="margin-bottom: 20px; opacity: 0.6; font-size: 0.9rem"
      ></div>
      <div class="grid" id="content">
        <div class="loading">Loading dashboard...</div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="footer-container">
        <div class="footer-col">
          <a href="index.html" class="logo-link"
            ><img src="favicon/icono.png" alt="LitFlick" class="logo-img" />
            <h1 class="logo">LitFlick</h1></a
          >
        </div>
        <div class="footer-col">
          <h3>Explore</h3>
          <ul class="footer-links">
            <li><a href="recommendations.html">For You</a></li>
            <li><a href="index.html">Movies</a></li>
            <li><a href="books.html">Books</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 LitFlick Inc. All rights reserved.</p>
      </div>
    </footer>

    <div class="modal" id="loginModal">
      <div class="modal-content" style="position: relative">
        <span
          onclick="closeModal()"
          style="
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            font-size: 1.5rem;
            opacity: 0.5;
          "
          >&times;</span
        >
        <h2 id="modalTitle" style="margin-bottom: 20px">Welcome</h2>
        <form id="authForm" onsubmit="handleAuth(event)">
          <div id="emailGroup" class="hidden" style="margin-bottom: 15px">
            <input
              type="email"
              id="email"
              placeholder="Email"
              class="profile-input"
            />
          </div>
          <input
            type="text"
            id="authUsername"
            placeholder="Username"
            required
            class="profile-input"
            style="margin-bottom: 12px"
          />
          <input
            type="password"
            id="authPassword"
            placeholder="Password"
            required
            class="profile-input"
            style="margin-bottom: 12px"
          />
          <button
            type="submit"
            class="btn-purple"
            style="width: 100%; padding: 12px"
          >
            Continue
          </button>
        </form>
        <p style="text-align: center; margin-top: 14px; font-size: 0.8rem">
          <a onclick="toggleAuthMode()" style="color: #a855f7; cursor: pointer"
            >Switch Login/Register</a
          >
        </p>
      </div>
    </div>
    <div id="logoutModal" class="modal">
      <div class="modal-content logout-modal-box">
        <div class="modal-icon">⚠️</div>
        <h2>Sign Out</h2>
        <p>Are you sure?</p>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeLogoutModal()">Cancel</button
          ><button class="btn-confirm-logout" onclick="confirmLogout()">
            Logout
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      window.onload = async () => {
        await checkAuth();
        if (!currentUser || !currentUser.is_admin) {
          window.location.href = "index.html";
          return;
        }
        showAdminDashboard();
      };
    </script>
  </body>
</html>
