name: CI Pipeline

on:
  push:
    branches: [Main, dev, feature/*]
  pull_request:
    branches: [Main, dev, feature/*]

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      #Check the code
      - name: Checkout Code
        uses: actions/checkout@v3

        #Set up python
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      #Check for Python syntax errors in the backend code
      - name: Python Syntax Check
        run: |
          python -m py_compile backend/*.py
          python -m py_compile backend/routes/*.py

      # Intall dependencies
      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      #Lint code
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/ --count --max-line-length=120 --statistics || true

      #Create a dummy .env
      - name: Setup Environment
        run: |
          touch .env
          echo "DATABASE_URL=postgresql://user:pass@db:5432/dbname" >> .env
          echo "TMDB_API_KEY=dummy_key" >> .env
          echo "GOOGLE_BOOKS_KEY=dummy_key" >> .env
          echo "JWT_SECRET_KEY=dummy_key" >> .env

      #Build docker containers
      - name: Build Docker Containers
        run: docker compose build

      #Start containers
      - name: Start Containers
        run: |
          docker compose up -d
          sleep 15

      #Health check
      - name: health check backend
        run: |
          curl --fail http://localhost:5000/health || exit 1

      - name: health check frontend
        run: |
          curl --fail http://localhost:8080 || exit 1

      #Clean up
      - name: Stop Containers
        if: always()
        run: docker compose down
